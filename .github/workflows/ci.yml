name: sable-research-ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,numpy]"
      - name: Run tests
        run: python -m pytest -q
      - name: Phase 4 release check
        run: python tools/check_release_artifacts.py . --json
      - name: Generate and verify KATs
        run: |
          python tools/generate_phase4_kats.py --out vectors
          python tools/verify_phase4_kats.py vectors
      - name: Build and inspect package
        run: |
          python -m pip install build twine
          rm -rf dist build *.egg-info src/*.egg-info
          python -m build
          python -m twine check dist/*
